; Pytest settings — applied automatically on every test run

[pytest]
; pythonpath = project root so 'pages' and 'utilities' import without PYTHONPATH
pythonpath = .
; -v = verbose (show each test name)
; --html = create HTML report in Reports folder
; --self-contained-html = embed CSS/images so report.html works as a single file
addopts = -v --html=Reports/report.html --self-contained-html
testpaths = tests
